*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FAFAF7;--bg2:#F2F0EB;--bg3:#fff;
  --text:#1A1A18;--text2:#666660;--text3:#999994;
  --border:#E2E0D8;--border2:#D0CEC4;
  --teal:#1D9E75;--teal-bg:#E1F5EE;--teal-dark:#085041;
  --radius:12px;--radius-sm:8px;
  --font-body:'DM Sans',sans-serif;
  --font-display:'Playfair Display',Georgia,serif;
}
body{background:var(--bg);font-family:var(--font-body);color:var(--text);min-height:100vh}
.wrap{max-width:1280px;margin:0 auto;padding:2rem 1.5rem}

/* HERO */
.hero{background:var(--teal-dark);border-radius:var(--radius);padding:2rem 2.5rem;margin-bottom:2rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px}
.hero-left .eyebrow{font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:#ffffff;margin-bottom:6px;margin-top: 6px;}
.hero-left h1{font-family:var(--font-display);font-size:28px;font-weight:400;color:#fff;line-height:1.2}
.hero-left p{font-size:13px;color:#9FE1CB;margin-top:5px}
.hero-stats{display:flex;gap:28px}
.hstat-val{font-size:26px;font-weight:300;color:#fff;font-family:var(--font-display)}
.hstat-lbl{font-size:11px;color:#9FE1CB;letter-spacing:.05em}

/* TOOLBAR */
.toolbar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:1.5rem}
.filters{display:flex;gap:7px;flex-wrap:wrap}
.fbtn{border:0.5px solid var(--border2);background:transparent;color:var(--text2);font-size:12px;padding:5px 14px;border-radius:99px;cursor:pointer;transition:all .15s;font-family:var(--font-body)}
.fbtn:hover{background:var(--bg2);color:var(--text)}
.fbtn.active{color:#fff;border-color:transparent}
.right-tools{display:flex;gap:8px;align-items:center}
.btn-export{font-size:12px;padding:6px 16px;border-radius:99px;cursor:pointer;border:0.5px solid var(--border2);background:transparent;color:var(--text2);display:flex;align-items:center;gap:6px;font-family:var(--font-body);transition:all .15s}
.btn-export:hover{background:var(--bg2)}
.search-wrap{position:relative;display:flex;align-items:center}
.search-wrap i{position:absolute;left:10px;font-size:14px;color:var(--text3);pointer-events:none}
.search-input{padding:6px 12px 6px 32px;border:0.5px solid var(--border2);border-radius:99px;background:var(--bg3);font-size:12px;font-family:var(--font-body);color:var(--text);width:200px;outline:none}
.search-input:focus{border-color:var(--teal)}

/* CATEGORY HEADER */
.cat-hdr{display:flex;align-items:center;gap:10px;margin:2.5rem 0 1.25rem;padding-bottom:10px;border-bottom:0.5px solid var(--border)}
.cdot{width:13px;height:13px;border-radius:50%;flex-shrink:0}
.ctitle{font-family:var(--font-display);font-size:20px;font-weight:400;color:var(--text)}
.ccount{font-size:12px;color:var(--text3)}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px}

/* CARD */
.card{background:var(--bg3);border:0.5px solid var(--border);border-radius:var(--radius);display:flex;flex-direction:column;overflow:hidden;transition:border-color .15s,box-shadow .15s;position:relative}
.card:hover{border-color:var(--border2);box-shadow:0 2px 12px rgba(0,0,0,.06)}

/* CARD IMAGE */
.card-img-wrap{width:100%;aspect-ratio:16/9;overflow:hidden;flex-shrink:0;display:block}
.card-img-wrap svg, .card-img-wrap img{width:100%;height:100%;object-fit:cover;display:block}

/* CARD BODY */
.card-body{padding:.9rem 1rem;display:flex;flex-direction:column;gap:6px;flex:1}
.ctop{display:flex;justify-content:space-between;align-items:flex-start;gap:6px}
.badge{font-size:10px;font-weight:500;padding:2px 8px;border-radius:99px;white-space:nowrap;flex-shrink:0}
.div{height:0.5px;background:var(--border)}

.pname-view{font-size:13px;font-weight:500;color:var(--text);line-height:1.35}
.ptags-view{font-size:11px;color:var(--text3);font-style:italic;line-height:1.4;min-height:14px}

.wrow{font-size:11px;color:var(--text2);display:flex;align-items:center;gap:4px}
.price-block{display:flex;justify-content:space-between;align-items:center;margin-top:2px}
.pdisp{font-size:14px;font-weight:500}
.ppg{font-size:11px;color:var(--text3)}
.cfoot{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text3)}
.sdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* EMPTY STATE */
.empty{text-align:center;padding:3rem 1rem;color:var(--text3)}
.empty i{font-size:32px;display:block;margin-bottom:8px}
.empty p{font-size:13px}

/* NO RESULTS */
.no-results{text-align:center;padding:3rem;color:var(--text3);font-size:14px}
</style>
</head>

let activeFilter = 'all';
let searchQ = '';

function totalP(){
  return CATS.reduce((a,c)=>a+c.products.length,0);
}

function pricedC(){
  return CATS.reduce((a,c)=>a+c.products.filter(p=>p.price && parseFloat(p.price)>0).length,0);
}

function updateStats(){
  document.getElementById('s-total').textContent = totalP();
  document.getElementById('s-cats').textContent = CATS.length;
  document.getElementById('s-priced').textContent = pricedC();
}

function onSearch(v){
  searchQ=v.toLowerCase();
  renderBody();
}

function setFilter(id){
  activeFilter=id;
  renderFilters();
  renderBody();
}

function getFiltered(){
  let cats = activeFilter==='all' ? CATS : CATS.filter(c=>c.id===activeFilter);
  if(!searchQ) return cats;
  return cats.map(c=>({
    ...c,
    products: c.products.filter(p=>
      p.name.toLowerCase().includes(searchQ)||
      p.tags.toLowerCase().includes(searchQ)
    )
  })).filter(c=>c.products.length>0);
}

function renderFilters(){
  const opts=[{id:'all',label:'All'},...CATS.map(c=>({id:c.id,label:c.name}))];
  document.getElementById('filters').innerHTML = opts.map(o=>{
    const cat=CATS.find(c=>c.id===o.id);
    const isActive=activeFilter===o.id;
    return `<button class="fbtn${isActive?' active':''}" style="${isActive&&cat?'background:'+cat.color+';border-color:transparent;color:#fff;':''}" onclick="setFilter('${o.id}')">${o.label}</button>`;
  }).join('');
}

function exportCSV(){
  const rows=[['Category','Product','Tags','Price','Unit','In Stock']];
  CATS.forEach(cat=>{
    cat.products.forEach(p=>{
      rows.push([cat.name,p.name,p.tags,p.price||'0.00',cat.unit,p.stock?'Yes':'No']);
    });
  });
  const csvContent="data:text/csv;charset=utf-8,"+rows.map(e=>e.map(val=>`"${String(val).replace(/"/g, '""')}"`).join(",")).join("\n");
  const encodedUri=encodeURI(csvContent);
  const link=document.createElement("a");
  link.setAttribute("href", encodedUri);
  link.setAttribute("download", "lumbini_catalog_export.csv");
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

function renderBody(){
  const data=getFiltered();
  const b=document.getElementById('body');
  if(data.length===0){
    b.innerHTML=`<div class="no-results">No products match your search/filter criteria.</div>`;
    return;
  }
  
  b.innerHTML=data.map(cat=>{
    const htmlCards=cat.products.map(p=>{
      const hasImg = p.imageUrl && p.imageUrl.trim().length > 0;
      const imgHtml = hasImg 
        ? `<img src="${p.imageUrl}" alt="${p.name}" loading="lazy"/>`
        : (CAT_SVG[cat.id] || '');
        
      const pVal = parseFloat(p.price);
      const isPriced = !isNaN(pVal) && pVal > 0;
      const disp = isPriced ? `$${pVal.toFixed(2)}` : '—';
      const dc = isPriced ? 'var(--text)' : 'var(--text3)';
      
      let ppgStr = '';
      if(isPriced && cat.unit !== 'item' && cat.unit !== 'unit' && cat.unit !== 'bar' && cat.unit !== 'pack'){
        ppgStr = `per 100g`;
      }

      return `
        <div class="card">
          <div class="card-img-wrap">
            ${imgHtml}
          </div>
          <div class="card-body">
            <div class="ctop">
              <span class="badge" style="background:${cat.badge.bg};color:${cat.badge.text}">${cat.badge.label}</span>
            </div>
            <div class="pname-view">${p.name}</div>
            <div class="ptags-view">${p.tags}</div>
            <div class="div"></div>
            <div class="wrow"><i class="ti ti-weight" style="font-size:12px;color:${cat.color}"></i>${cat.weights}</div>
            <div class="price-block">
              <div class="pdisp" style="color:${dc}">${disp}</div>
              ${ppgStr?`<div class="ppg">${ppgStr}</div>`:''}
            </div>
            <div class="div"></div>
            <div class="cfoot">
              <div class="sdot" style="background:${p.stock?'var(--teal)':'#E24B4A'}"></div>
              <span>${p.stock?'In Stock':'Out of Stock'}</span>
            </div>
          </div>
        </div>
      `;
    }).join('');

    return `
      <div class="cat-section">
        <div class="cat-hdr">
          <div class="cdot" style="background:${cat.color}"></div>
          <div class="ctitle">${cat.name}</div>
          <div class="ccount">${cat.products.length} items</div>
        </div>
        <div class="grid">${htmlCards}</div>
      </div>
    `;
  }).join('');
}

window.onload=function(){
  renderFilters();
  renderBody();
  updateStats();
};
</script>
